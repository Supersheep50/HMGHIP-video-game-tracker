name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Inject RAWG API key
        run: |
          echo '{"Rawg":{"ApiKey":"${{ secrets.RAWG_API_KEY }}"}}' \
            > wwwroot/appsettings.json

      - name: Publish
        run: dotnet publish PlayedGames.csproj -c Release -o release --nologo

      - name: Set base href for GitHub Pages
        run: |
          sed -i 's|<base href="/" />|<base href="/HMGHIP-video-game-tracker/" />|' release/wwwroot/index.html

      - name: Copy index.html → 404.html (client-side routing)
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Disable Jekyll
        run: touch release/wwwroot/.nojekyll

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: release/wwwroot
          branch: gh-pages
