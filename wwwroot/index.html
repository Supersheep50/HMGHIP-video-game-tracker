<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>HMGHIP</title>
    <base href="/HMGHIP-video-game-tracker/" />

    <!-- Fonts + MudBlazor -->
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />

    <!-- App styles -->
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="PlayedGames.styles.css" />

    <!-- PWA -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#7c3aed" />
    <link rel="icon" type="image/png" href="icon-192.png" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HMGHIP" />

    <style>
        #boot-screen {
            position: fixed;
            inset: 0;
            background: #0d1117;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
            z-index: 9999;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            transition: opacity 0.5s ease;
        }
        #boot-screen.boot-done {
            opacity: 0;
            pointer-events: none;
        }
        .boot-icon {
            animation: bootPulse 1.6s ease-in-out infinite;
            margin-bottom: 1.5rem;
        }
        @keyframes bootPulse {
            0%, 100% { opacity: 1;   transform: scale(1); }
            50%       { opacity: 0.6; transform: scale(0.94); }
        }
        .boot-title {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.25rem;
        }
        .boot-sub {
            font-size: 0.7rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #4b5563;
            margin-bottom: 2.5rem;
        }
        .boot-bar-wrap {
            width: min(300px, 72vw);
            height: 10px;
            border: 1px solid #30363d;
            border-radius: 2px;
            background: #0d0f1a;
            overflow: hidden;
            box-shadow: 0 0 14px rgba(124,58,237,0.25);
            margin-bottom: 1rem;
            position: relative;
        }
        .boot-bar-fill {
            height: 100%;
            width: 0%;
            /* Segmented pixel-bar look */
            background: repeating-linear-gradient(
                90deg,
                #7c3aed 0px, #a78bfa 6px,
                #6d28d9 7px, #6d28d9 11px
            );
            box-shadow: 0 0 10px rgba(167,139,250,0.7);
            animation: bootBar 3.8s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
            border-radius: 1px;
        }
        @keyframes bootBar {
            0%   { width: 0%; }
            15%  { width: 22%; }
            35%  { width: 48%; }
            55%  { width: 66%; }
            72%  { width: 80%; }
            88%  { width: 91%; }
            96%  { width: 97%; }
            100% { width: 100%; }
        }
        .boot-msg {
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            color: #6b7280;
            text-transform: uppercase;
            min-height: 1.1em;
            transition: opacity 0.3s;
        }
        .boot-tip-wrap {
            position: absolute;
            bottom: 2.5rem;
            left: 0;
            right: 0;
            padding: 0 2rem;
            text-align: center;
            animation: fadeUp 0.6s 1.2s ease both;
        }
        .boot-tip-label {
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #a78bfa;
            margin-bottom: 0.4rem;
        }
        .boot-tip-text {
            font-size: 0.78rem;
            color: #4b5563;
            line-height: 1.6;
            max-width: 320px;
            margin: 0 auto;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <div id="boot-screen">
            <div class="boot-icon">
                <svg width="56" height="56" viewBox="0 0 24 24" fill="#a78bfa" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5S14.67 12 15.5 12s1.5.67 1.5 1.5S16.33 15 15.5 15zm3-3c-.83 0-1.5-.67-1.5-1.5S17.67 9 18.5 9s1.5.67 1.5 1.5S19.33 12 18.5 12z"/>
                </svg>
            </div>
            <div class="boot-title">HMGHIP</div>
            <div class="boot-sub">How Many Games Have I Played</div>
            <div class="boot-bar-wrap">
                <div class="boot-bar-fill"></div>
            </div>
            <div class="boot-msg" id="boot-msg">Loading...</div>
            <div class="boot-tip-wrap">
                <div class="boot-tip-label">Tip</div>
                <div class="boot-tip-text" id="boot-tip"></div>
            </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script>
        const msgs = [
            'Loading...',
            'Loading game library...',
            'Fetching achievements...',
            'Buffering open worlds...',
            'Defeating final bosses...',
            'Respawning at checkpoint...',
            'Syncing cloud saves...',
            'Unlocking trophies...',
            'Almost ready...'
        ];
        let mi = 0;
        const msgEl = document.getElementById('boot-msg');
        const msgInterval = setInterval(() => {
            mi = (mi + 1) % msgs.length;
            msgEl.style.opacity = '0';
            setTimeout(() => {
                msgEl.textContent = msgs[mi];
                msgEl.style.opacity = '1';
            }, 150);
        }, 900);

        const tips = [
            'Explore every corner — the best loot is never on the main path.',
            'Save often. The autosave isn\'t always watching.',
            'Talk to every NPC at least twice. They remember things.',
            'Side quests aren\'t distractions. They\'re the real game.',
            'Check your inventory. You\'ve been carrying that item for a reason.',
            'The final boss always has a weakness. Everyone does.',
            'You can always come back. Almost nothing is truly missable.',
            'Turn up the brightness. The developers hid things in the dark.',
            'The map lies. Trust your instincts.',
            'There\'s always a third option. You just haven\'t found it yet.',
            'In every game, the merchants buy high and sell higher. Budget accordingly.',
            'A full party beats a powerful solo every time.',
        ];
        document.getElementById('boot-tip').textContent =
            tips[Math.floor(Math.random() * tips.length)];

        // Record when the page started loading
        const bootStart = Date.now();
        const MIN_MS = 4000; // must show for at least 4 seconds

        // Called by MainLayout once Blazor has fully rendered
        window._appReady = function () {
            clearInterval(msgInterval);
            const elapsed = Date.now() - bootStart;
            const remaining = Math.max(0, MIN_MS - elapsed);
            setTimeout(() => {
                const screen = document.getElementById('boot-screen');
                if (!screen) return;
                screen.classList.add('boot-done');
                setTimeout(() => screen.remove(), 500);
            }, remaining);
        };
    </script>

    <script>
        // Haptic feedback — Android Chrome only (iOS Safari has no web vibration API)
        window.haptic = (ms) => {
            if (navigator.vibrate) navigator.vibrate(ms ?? 30);
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>

    <script type="module">
        import { initializeApp }                                          from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut,
                 onAuthStateChanged }                                     from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc }                     from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

        const app  = initializeApp({
            apiKey:            "AIzaSyCDLuGg9YNc4rt2xqn2uza6uy1cBLmAnZ0",
            authDomain:        "hmghip.firebaseapp.com",
            projectId:         "hmghip",
            storageBucket:     "hmghip.firebasestorage.app",
            messagingSenderId: "1074892961768",
            appId:             "1:1074892961768:web:a79783c2c594c234c9d65d"
        });

        const auth = getAuth(app);
        const db   = getFirestore(app);

        const serialize = u => ({
            uid: u.uid, displayName: u.displayName,
            email: u.email, photoURL: u.photoURL
        });

        window.firebaseSignInGoogle = async () => {
            const result = await signInWithPopup(auth, new GoogleAuthProvider());
            return serialize(result.user);
        };

        window.firebaseSignOut = () => signOut(auth);

        window.firebaseGetCurrentUser = () => new Promise(resolve => {
            const unsub = onAuthStateChanged(auth, user => {
                unsub();
                resolve(user ? serialize(user) : null);
            });
        });

        window.firestoreSaveGameStatus = async (userId, gameName, status) => {
            await setDoc(doc(db, 'users', userId),
                { gameStatuses: { [gameName]: status } }, { merge: true });
        };

        window.firestoreGetGameStatuses = async (userId) => {
            const snap = await getDoc(doc(db, 'users', userId));
            return snap.exists() ? (snap.data().gameStatuses ?? {}) : {};
        };

        window.firestoreSaveTop3 = async (userId, gameNames) => {
            await setDoc(doc(db, 'users', userId), { top3: gameNames }, { merge: true });
        };

        window.firestoreGetTop3 = async (userId) => {
            const snap = await getDoc(doc(db, 'users', userId));
            return snap.exists() ? (snap.data().top3 ?? [null, null, null]) : [null, null, null];
        };

        window.firestoreSaveProfile = async (userId, username) => {
            await setDoc(doc(db, 'users', userId), { username, profileComplete: true }, { merge: true });
        };

        window.firestoreGetProfile = async (userId) => {
            const snap = await getDoc(doc(db, 'users', userId));
            return snap.exists() ? snap.data() : null;
        };
    </script>
</body>
</html>
